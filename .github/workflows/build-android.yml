name: Build cktool for Android ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        echo "y" | sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

    - name: Build cktool for ARM64
      run: |
        mkdir build-android && cd build-android
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_SDK_ROOT/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build . --target cktool

    - name: Upload cktool binary
      uses: actions/upload-artifact@v3
      with:
        name: cktool-android-arm64
        path: build-android/cktool
