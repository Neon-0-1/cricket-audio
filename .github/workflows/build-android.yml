name: Build cktool for Android ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      run: git clone https://github.com/${{ github.repository }} .

    - name: Install NDK r21
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "ndk;21.4.7075529"

    - name: Patch Makefiles and source for Android
      run: |
        # Patch cktool Makefile
        sed -i 's/CK_TARGET_OS := linux/CK_TARGET_OS := android/' src/cktool/Makefile
        sed -i 's/CK_LINK_LIBS := ck tinyxml asound pthread/CK_LINK_LIBS := ck tinyxml/' src/cktool/Makefile

        # Remove conflicting system STL includes
        sed -i 's|-isystem$(CK_ANDROID_NDK_DIR)/sources/cxx-stl/system/include||g' build/Makefile-common
        sed -i 's|-I$(CK_ANDROID_NDK_DIR)/sources/cxx-stl/system/include||g' build/Makefile-common

        # Remove -gcc-toolchain flag
        sed -i 's|-gcc-toolchain $(GCC_DIR)||g' build/Makefile-common

        # Patch Makefile-common using Python
        python3 << 'PYEOF'
        content = open('build/Makefile-common').read()

        # Use versioned clang wrappers (they know sysroot, crt, libs automatically)
        old_cc = '''ifeq ($(CK_TARGET_OS),android)
          AR := $(GCC_DIR)/bin/$(GCC_PREFIX)-ar 
          CC := $(LLVM_DIR)/bin/clang
          CXX := $(LLVM_DIR)/bin/clang++'''
                new_cc = '''ifeq ($(CK_TARGET_OS),android)
          AR := $(LLVM_DIR)/bin/llvm-ar
          CC := $(LLVM_DIR)/bin/$(GCC_PREFIX)$(CK_API_TARGET)-clang
          CXX := $(LLVM_DIR)/bin/$(GCC_PREFIX)$(CK_API_TARGET)-clang++'''
        content = content.replace(old_cc, new_cc)

        open('build/Makefile-common', 'w').write(content)
        print('Patched CC/CXX to versioned clang wrappers')
        PYEOF

        # Patch main.cpp: CkConfig needs JNI args on Android
        sed -i 's/CkConfig config;/CkConfig config((JNIEnv*)nullptr, (jobject)nullptr);/' src/cktool/main.cpp

    - name: Build cktool for Android ARM64
      run: |
        export CK_ANDROID_NDK_DIR=$ANDROID_SDK_ROOT/ndk/21.4.7075529
        export CK_ANDROID_SDK_DIR=$ANDROID_SDK_ROOT
        export CPU_FEATURES_INC="-isystem$CK_ANDROID_NDK_DIR/sources/android/cpufeatures"
        cd src/cktool
        make CK_ARCH=arm64-v8a CK_CONFIG=release \
          CK_ANDROID_NDK_DIR=$CK_ANDROID_NDK_DIR \
          CK_ANDROID_SDK_DIR=$CK_ANDROID_SDK_DIR \
          CK_C_FLAGS="$CPU_FEATURES_INC" \
          CK_CPP_FLAGS="$CPU_FEATURES_INC"

    - name: Find built binary
      run: find . -name "cktool" -not -path "./.git/*" | sort

    - name: Upload cktool binary
      uses: actions/upload-artifact@v4
      with:
        name: cktool-android-arm64
        path: bin/android/arm64-v8a/release/cktool
        
