name: Build cktool for Android ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      run: git clone https://github.com/${{ github.repository }} .

    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "ndk;25.2.9519653" \
          "cmake;3.22.1"

    - name: Build cktool for ARM64
      run: |
        export NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653
        mkdir build-android && cd build-android
        $ANDROID_SDK_ROOT/cmake/3.22.1/bin/cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release
        $ANDROID_SDK_ROOT/cmake/3.22.1/bin/cmake --build . --target cktool

    - name: Upload cktool binary
      uses: actions/upload-artifact@v4
      with:
        name: cktool-android-arm64
        path: build-android/cktool
