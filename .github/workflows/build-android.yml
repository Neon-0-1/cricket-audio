name: Build cktool for Android ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      run: git clone https://github.com/${{ github.repository }} .

    - name: Install NDK r21
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "ndk;21.4.7075529"

    - name: Patch Makefiles and source for Android
      run: |
        sed -i 's/CK_TARGET_OS := linux/CK_TARGET_OS := android/' src/cktool/Makefile
        sed -i 's/CK_LINK_LIBS := ck tinyxml asound pthread/CK_LINK_LIBS := ck tinyxml/' src/cktool/Makefile
        sed -i 's|-isystem$(CK_ANDROID_NDK_DIR)/sources/cxx-stl/system/include||g' build/Makefile-common
        sed -i 's|-I$(CK_ANDROID_NDK_DIR)/sources/cxx-stl/system/include||g' build/Makefile-common
        sed -i 's/-gcc-toolchain $(GCC_DIR)//g' build/Makefile-common
        sed -i 's/CkConfig config;/CkConfig config((JNIEnv*)nullptr, (jobject)nullptr);/' src/cktool/main.cpp

    - name: Build cktool for Android ARM64
      run: |
        export NDK=$ANDROID_SDK_ROOT/ndk/21.4.7075529
        export LLVM=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
        export CPU_INC="-isystem$NDK/sources/android/cpufeatures"

        cd src/cktool
        make CK_ARCH=arm64-v8a CK_CONFIG=release \
          CK_ANDROID_NDK_DIR=$NDK \
          CK_ANDROID_SDK_DIR=$ANDROID_SDK_ROOT \
          CC=$LLVM/aarch64-linux-android21-clang \
          CXX=$LLVM/aarch64-linux-android21-clang++ \
          AR=$LLVM/llvm-ar \
          RANLIB=$LLVM/llvm-ranlib \
          CK_C_FLAGS="$CPU_INC" \
          CK_CPP_FLAGS="$CPU_INC"

    - name: Find built binary
      run: find . -name "cktool" -not -path "./.git/*" | sort

    - name: Upload cktool binary
      uses: actions/upload-artifact@v4
      with:
        name: cktool-android-arm64
        path: bin/android/arm64-v8a/release/cktool
        
