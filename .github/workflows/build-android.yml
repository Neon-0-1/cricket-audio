name: Build cktool for Android ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      run: git clone https://github.com/${{ github.repository }} .

    - name: Discover build system
      run: |
        echo "=== Root files ==="
        ls -la
        echo ""
        echo "=== All build files ==="
        find . -name "CMakeLists.txt" \
               -o -name "Makefile" \
               -o -name "*.mk" \
               -o -name "build.py" \
               -o -name "*.gradle" \
               -o -name "Android.mk" \
               -o -name "configure" \
               -o -name "*.sh" | grep -v ".git" | sort
        echo ""
        echo "=== README ==="
        cat README.md 2>/dev/null || cat README 2>/dev/null || echo "No README found"
        
